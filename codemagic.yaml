workflows:
  android-release:
    name: Synex Live Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Build Synex App
        script: |
          set -e
          echo "=== Repo structure ==="
          ls -la
          
          # Auto-detect source folder
          if [ -d "synex_merged" ]; then
            SRC="synex_merged"
          elif [ -d "synex_live" ]; then
            SRC="synex_live"
          else
            echo "ERROR: Source folder not found!"
            ls -la
            exit 1
          fi
          echo "Using source folder: $SRC"
          ls -la $SRC/lib/
          
          # Copy source to temp
          cp -r $SRC/lib /tmp/our_lib
          cp $SRC/pubspec.yaml /tmp/our_pubspec.yaml
          
          # Create fresh Flutter project
          cd /tmp
          flutter create --org com.synex --project-name synex_app synex_app
          
          # Replace lib and pubspec
          rm -rf /tmp/synex_app/lib
          cp -r /tmp/our_lib /tmp/synex_app/lib
          cp /tmp/our_pubspec.yaml /tmp/synex_app/pubspec.yaml
          
          # Fix package name
          sed -i 's/com.example.synex_app/com.synex.synex_live/g' /tmp/synex_app/android/app/build.gradle
          
          # Add permissions
          cat > /tmp/perms.txt << 'PERMS'
    <uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.RECORD_AUDIO"/>
    <uses-permission android:name="android.permission.CAMERA"/>
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
PERMS
          sed -i 's|<application|'"$(cat /tmp/perms.txt)"'\n    <application|g' /tmp/synex_app/android/app/src/main/AndroidManifest.xml
          
          echo "=== main.dart check ==="
          head -3 /tmp/synex_app/lib/main.dart
          
          # Get packages
          cd /tmp/synex_app
          flutter pub get
          
          # Build APK
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - /tmp/synex_app/build/**/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
