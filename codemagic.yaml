workflows:
  android-release:
    name: Synex Live Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Build Synex App
        script: |
          set -e
          echo "=== Working directory ==="
          pwd
          echo "=== Repo contents ==="
          ls -la
          
          # Backup our source files
          cp -r synex_live/lib /tmp/our_lib
          cp synex_live/pubspec.yaml /tmp/our_pubspec.yaml
          
          echo "=== Our lib folder ==="
          ls -la /tmp/our_lib/
          
          # Create fresh Flutter project at a different location
          cd /tmp
          flutter create --org com.synex --project-name synex_app synex_app
          
          # Replace lib and pubspec with ours
          rm -rf /tmp/synex_app/lib
          cp -r /tmp/our_lib /tmp/synex_app/lib
          cp /tmp/our_pubspec.yaml /tmp/synex_app/pubspec.yaml
          
          # Fix package name
          sed -i 's/com.example.synex_app/com.synex.synex_live/g' /tmp/synex_app/android/app/build.gradle
          
          # Add permissions
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/><uses-permission android:name="android.permission.RECORD_AUDIO"\/><uses-permission android:name="android.permission.CAMERA"\/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"\/><application/g' /tmp/synex_app/android/app/src/main/AndroidManifest.xml
          
          echo "=== Verifying main.dart ==="
          head -3 /tmp/synex_app/lib/main.dart
          
          # Get packages
          cd /tmp/synex_app
          flutter pub get
          
          # Build APK
          flutter build apk --release --no-tree-shake-icons
          
          # Copy APK back to original workspace
          mkdir -p /home/builder/clone/synex_live/build/app/outputs/flutter-apk/
          cp /tmp/synex_app/build/app/outputs/flutter-apk/app-release.apk /home/builder/clone/synex_live/build/app/outputs/flutter-apk/ 2>/dev/null || true
          cp /tmp/synex_app/build/app/outputs/flutter-apk/app-release.apk $CM_BUILD_DIR/app-release.apk 2>/dev/null || true

    artifacts:
      - /tmp/synex_app/build/**/outputs/**/*.apk
      - $CM_BUILD_DIR/*.apk

    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
