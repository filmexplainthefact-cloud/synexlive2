workflows:
  android-release:
    name: Synex Live Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Build Flutter App
        script: |
          echo "=== STRUCTURE ==="
          ls -la
          echo "=== synex_merged ==="
          ls -la synex_merged/
          
          flutter create --org com.synex --project-name synex_live /tmp/synex_build
          
          rm -rf /tmp/synex_build/lib
          cp -r synex_merged/lib /tmp/synex_build/lib
          cp synex_merged/pubspec.yaml /tmp/synex_build/pubspec.yaml
          
          if [ -d "synex_merged/assets" ]; then
            cp -r synex_merged/assets /tmp/synex_build/assets
          fi
          
          python3 -c "
          f = open('/tmp/synex_build/android/app/build.gradle', 'r')
          c = f.read()
          f.close()
          c = c.replace('com.example.synex_live', 'com.synex.synex_live')
          f = open('/tmp/synex_build/android/app/build.gradle', 'w')
          f.write(c)
          f.close()
          print('build.gradle updated')
          "
          
          python3 << 'PYEOF'
          manifest = """<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <uses-feature android:name="android.hardware.microphone" android:required="false"/>
              <application
                  android:label="Synex Live"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>"""
          with open('/tmp/synex_build/android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(manifest)
          print("Manifest written")
          PYEOF
          
          echo "=== VERIFY lib/main.dart exists ==="
          ls /tmp/synex_build/lib/main.dart
          
          rm -rf ./synex_out
          cp -r /tmp/synex_build ./synex_out
          
          echo "=== FINAL CHECK ==="
          ls synex_out/lib/main.dart

      - name: Get packages
        script: |
          cd synex_out
          flutter pub get

      - name: Build APK
        script: |
          cd synex_out
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - synex_out/build/**/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
